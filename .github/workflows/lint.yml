
name: Verificar acciones


on:
  push:
    branches:
      - main 

jobs:
  lint:           
    runs-on: ubuntu-latest   

    
    steps:
      - name: Clonar repo
        uses: actions/checkout@v4   

      - name: Instalar python
        uses: actions/setup-python@v5   
        with:
          python-version: "3.11"

      - name: Instalar flake8 
        run: pip install flake8   

      - name: Analizar archivo 
        run: flake8 escaner_puertos.py   
